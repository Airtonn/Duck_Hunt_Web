<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Duck</title>
    <link rel="stylesheet" type="text/css" href="game.css">
</head>

<body>
    <!-- Game Elements (initially hidden) -->
    <div id="game-ui" style="display: none;">
        <div id="duck"></div>
        <div id="scoreBox">
            <span class="score-label">Pontos</span>
            <span id="score">00000</span>
        </div>
        <div id="ammo">
            <span class="ammo-label">Munição</span>
            <div class="ammo-bullets">
                <span class="ammo-pip" data-index="0"></span>
                <span class="ammo-pip" data-index="1"></span>
                <span class="ammo-pip" data-index="2"></span>
                <span class="ammo-pip" data-index="3"></span>
                <span class="ammo-pip" data-index="4"></span>
            </div>
        </div>
        <div id="duckStats">
            <div id="lifeBox">
                <div id="life">
                    <span id="lifeValue">100</span>
                </div>
            </div>
            <div id="energyBox">
                <div id="energy">
                    <span id="energyValue">100</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu">
        <div class="menu-buttons">
            <button id="play-btn" class="menu-btn">Jogar</button>
            <button id="how-to-play-btn" class="menu-btn">Como Jogar</button>
        </div>
    </div>

    <!-- Instructions Screen -->
    <div id="instructions" style="display: none;">
        <div class="instructions-content">
            <h1>Como Jogar</h1>
            <div class="instructions-text">
                <p><strong>Objetivo:</strong> O objetivo do jogo é caçar os caçadores e evitar que os cachorros te atinjam.</p>
                <p><strong>Controles:</strong></p>
                <ul>
                    <li>Mova o mouse para mirar.</li>
                    <li>Clique com o botão esquerdo para atirar.</li>
                    <li>Recarregue sua munição coletando itens ou vencendo rodadas.</li>
                </ul>
            </div>
            <button id="back-to-menu-btn" class="menu-btn">Voltar</button>
        </div>
    </div>

    <script type="module" src="menu.js"></script>
    <script type="module" src="./levels/level3.js"></script>
</body>

</html>
